services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://co2user:co2pass@db:5432/co2rechner
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@co2rechner.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: co2user
      POSTGRES_PASSWORD: co2pass
      POSTGRES_DB: co2rechner
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U co2user -d co2rechner"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
